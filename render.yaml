# Deploy: New → Blueprint (use this file) OR New → Static Site with:
#   Build command:    npm ci && npm run build
#   Publish directory: dist   ← must be "dist", not repo root (root would ship /src/main.jsx)
#   Add rewrite: source /* → destination /index.html (type: Rewrite)
services:
  - type: web
    name: portfolio
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
